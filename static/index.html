<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Solar Farm Monitoring Dashboard</title>
  <style>
    /* Basic page styling */
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f9;
      margin: 0;
      padding: 20px;
    }
    h2, h3 {
      text-align: center;
      color: #333;
    }
    .section {
      margin-bottom: 40px;
    }
    /* Container styles for upload section */
    .upload-section {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .upload-section input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .upload-section button {
      background: #007bff;
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    .upload-section button:hover {
      background: #0056b3;
    }
    /* Image display grid */
    .image-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      padding: 10px;
      text-align: center;
      width: 300px;
    }
    .card img {
      width: 100%;
    }
    /* Table styling for metrics output */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    table, th, td {
      border: 1px solid #ddd;
    }
    th, td {
      padding: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>Solar Farm Monitoring Dashboard</h2>
  
  <!-- Section 1: Image Upload & Fault Detection -->
  <div class="section upload-section">
    <h3>Upload Thermal Image</h3>
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="predict()">Predict Faults</button>
    <p id="uploadOutput"></p>
    <div class="image-grid">
      <div class="card">
        <h4>Input Image</h4>
        <img id="inputImg" src="" alt="Input Image">
      </div>
      <div class="card">
        <h4>Fault Detection</h4>
        <img id="faultImg" src="" alt="Fault Detection">
      </div>
      <div class="card">
        <h4>Fault Parts</h4>
        <div id="faultPartsContainer"></div>
      </div>
    </div>
  </div>
  
  <!-- Section 2: Auto Display Analysis Metrics -->
  <div class="section">
    <h3>Analysis Metrics</h3>
    <div id="calcResults"></div>
  </div>
  
  <script>
    async function predict() {
      const fileInput = document.getElementById("fileInput");
      const uploadOutput = document.getElementById("uploadOutput");
      const faultPartsContainer = document.getElementById("faultPartsContainer");
      const calcResults = document.getElementById("calcResults");

      // Clear previous results
      uploadOutput.innerText = "";
      document.getElementById("inputImg").src = "";
      document.getElementById("faultImg").src = "";
      faultPartsContainer.innerHTML = "";
      calcResults.innerHTML = "";

      if (!fileInput.files.length) {
        alert("Please select an image first!");
        return;
      }

      uploadOutput.innerText = "⏳ Processing...";
      const formData = new FormData();
      formData.append("image", fileInput.files[0]);

      try {
        const res = await fetch("/predict", { method: "POST", body: formData });
        const data = await res.json();
        if (data.error) {
          uploadOutput.innerText = "❌ " + data.error;
          return;
        }
        uploadOutput.innerText = `✅ ${data.prediction} (Confidence: ${data.confidence}%)`;
        document.getElementById("inputImg").src = "data:image/png;base64," + data.input_image;
        document.getElementById("faultImg").src = "data:image/png;base64," + data.fault_detection;
        
        // Display individual fault parts
        if (data.fault_parts && Array.isArray(data.fault_parts)) {
          data.fault_parts.forEach((base64Str, index) => {
            const faultDiv = document.createElement("div");
            faultDiv.style.border = "3px dashed #007bff";
            faultDiv.style.margin = "10px";
            faultDiv.style.padding = "5px";
            const faultImg = document.createElement("img");
            faultImg.src = "data:image/png;base64," + base64Str;
            faultImg.alt = `Fault Part ${index + 1}`;
            faultDiv.appendChild(faultImg);
            faultPartsContainer.appendChild(faultDiv);
          });
        }

        // Now automatically display analysis metrics from the prediction
        if (data.analysis) {
          const analysis = data.analysis;
          let resultsHtml = `
            <table>
              <tr>
                <th>Metric</th>
                <th>Observed Value</th>
                <th>Standard Threshold</th>
                <th>Status</th>
                <th>Inference</th>
              </tr>
              <tr>
                <td>Power Output Drop</td>
                <td>${analysis.power_output_drop.observed_value}%</td>
                <td>${analysis.power_output_drop.standard_threshold}</td>
                <td>${analysis.power_output_drop.status}</td>
                <td>${analysis.power_output_drop.inference}</td>
              </tr>
              <tr>
                <td>Performance Ratio (PR)</td>
                <td>${analysis.performance_ratio.observed_value}%</td>
                <td>${analysis.performance_ratio.standard_threshold}</td>
                <td>${analysis.performance_ratio.status}</td>
                <td>${analysis.performance_ratio.inference}</td>
              </tr>
              <tr>
                <td>Annual Degradation Rate</td>
                <td>${analysis.degradation_rate.observed_value}%/year</td>
                <td>${analysis.degradation_rate.standard_threshold}</td>
                <td>${analysis.degradation_rate.status}</td>
                <td>${analysis.degradation_rate.inference}</td>
              </tr>
              <tr>
                <td>Temperature Loss</td>
                <td>${analysis.temperature_loss.observed_value} kW</td>
                <td>-</td>
                <td>-</td>
                <td>${analysis.temperature_loss.inference}</td>
              </tr>
            </table>
          `;
          calcResults.innerHTML = resultsHtml;
        }
      } catch (err) {
        uploadOutput.innerText = "❌ Error: " + err.message;
      }
    }
  </script>
</body>
</html>
